name: Continuous Integration

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['main', 'release/**']
  workflow_dispatch:

permissions:
  contents: read
  checks: write        # EnricoMi test-result publishing (FR-022)
  pull-requests: write # surface per-gate test results on the PR

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SBT_OPTS: -Dsbt.color=true -Dsbt.log.noformat=false -Dsbt.supershell=false
  JAVA_OPTS: -Xms2G -Xmx2G -Xss4M -XX:+UseG1GC
  JVM_OPTS: -Xms2G -Xmx2G -Xss4M -XX:+UseG1GC
  FORCE_COLOR: "1"
  TERM: xterm-256color

jobs:
  format:
    name: Check Formatting
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/sbt-setup
      - run: sbt scalafmtCheckAll scalafmtSbtCheck

  test:
    name: Test (Java ${{ matrix.java-version }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        java-version: ['17', '21']
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/sbt-setup
        with:
          java-version: ${{ matrix.java-version }}
      - name: Test
        run: sbt Test/test
      - name: Publish unit test results (Java ${{ matrix.java-version }})
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@283dea176069279a9076e77b548668a8e4f0c31b # v2.9.0
        with:
          check_name: "Unit test results (Java ${{ matrix.java-version }})"
          junit_files: "**/target/test-reports/*.xml"
      - name: Upload unit test report XML (Java ${{ matrix.java-version }})
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-unit-java${{ matrix.java-version }}
          path: "**/target/test-reports/*.xml"
          if-no-files-found: warn
          retention-days: 7

  publish-local:
    name: Publish Local
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/sbt-setup
      - name: Publish local Picatinny artifact
        shell: bash
        run: |
          set -euo pipefail
          sbt 'set ThisBuild / version := "0.0.0-ci-local"' \
              'set ThisBuild / publishM2Configuration := publishM2Configuration.value.withOverwrite(true)' \
              publishLocal publishM2

          OUT="${GITHUB_WORKSPACE}/ci-artifacts"
          mkdir -p "${OUT}/ivy" "${OUT}/m2"
          cp -r "$HOME/.ivy2/local/org.galaxio" "${OUT}/ivy/"
          cp -r "$HOME/.m2/repository/org/galaxio" "${OUT}/m2/"
          echo "Staged $(find "${OUT}" -type f | wc -l) files to ${OUT}"
      - uses: actions/upload-artifact@v7
        with:
          name: picatinny-local
          path: ${{ github.workspace }}/ci-artifacts/
          retention-days: 1
          if-no-files-found: error

  template-tests:
    name: Template / ${{ matrix.template }} (Java ${{ matrix.java-version }})
    needs: [publish-local]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        java-version: ['21']
        template: [java-maven, kotlin-gradle, scala-sbt]
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/sbt-setup
        with:
          java-version: ${{ matrix.java-version }}

      - name: Setup Gradle
        if: matrix.template == 'kotlin-gradle'
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.6'

      - name: Setup Go for galaxio CLI
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Install galaxio CLI
        run: go install github.com/galax-io/galaxio-cli/cmd/galaxio@latest

      - name: Cache Maven repository
        if: matrix.template == 'java-maven'
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: m2-${{ runner.os }}-${{ hashFiles('examples/java-maven-example/pom.xml') }}
          restore-keys: m2-${{ runner.os }}-

      - uses: actions/download-artifact@v8
        with:
          name: picatinny-local
          path: ${{ github.workspace }}/ci-artifacts/

      - name: Restore local artifacts
        shell: bash
        run: |
          set -euo pipefail
          OUT="${GITHUB_WORKSPACE}/ci-artifacts"
          mkdir -p "$HOME/.ivy2/local" "$HOME/.cache/coursier/v1/local" "$HOME/.m2/repository/org"
          cp -r "${OUT}/ivy/org.galaxio" "$HOME/.ivy2/local/"
          cp -r "${OUT}/ivy/org.galaxio" "$HOME/.cache/coursier/v1/local/"
          cp -r "${OUT}/m2/galaxio" "$HOME/.m2/repository/org/"

      - name: Java Maven Gatling project from template main
        if: matrix.template == 'java-maven'
        shell: bash
        run: |
          set -euo pipefail

          work_dir="$(mktemp -d)"
          trap 'rm -rf "$work_dir"' EXIT

          templates_dir="$work_dir/templates-gatling"
          registry_dir="$work_dir/registry"
          project_dir="$work_dir/java-maven-example"

          git clone --depth 1 https://github.com/galax-io/templates-gatling.git "$templates_dir"

          mkdir -p "$registry_dir"
          cat > "$registry_dir/galaxio-registry.yaml" <<YAML
          apiVersion: galaxio.io/v1
          kind: TemplateRegistry
          packs:
            - name: gatling
              source: local:$templates_dir
              description: Gatling performance testing templates from main
          YAML

          galaxio template init gatling/java-maven \
            --registry "local:$registry_dir" \
            --destination "$project_dir" \
            --set Name=java-maven-example \
            --set NameWord=picatinny \
            --set Package=org.galaxio.performance \
            --set PackagePath=org/galaxio/performance \
            --set GatlingPicatinnyVersion=0.0.0-ci-local \
            --set BaseUrl=http://localhost \
            --set BaseAuthUrl=http://localhost/auth \
            --set WsBaseUrl=ws://localhost/ws \
            --set Intensity="60 rpm" \
            --set StagesNumber=2 \
            --set RampDuration="1 second" \
            --set StageDuration="1 second" \
            --set TestDuration="5 seconds" \
            --set StartupBannerEnabled=true \
            --set DiagnosticsEnabled=true

          rm -rf "$project_dir/src/test/java/org/galaxio/performance/picatinny"
          cp -R examples/java-maven-example/src/test/java/org/galaxio/performance/picatinny \
            "$project_dir/src/test/java/org/galaxio/performance/picatinny"
          rm -rf "$project_dir/src/test/resources"
          cp -R examples/java-maven-example/src/test/resources "$project_dir/src/test/resources"

          python3 -c "
pom = open('$project_dir/pom.xml').read()
dep = '''
    <dependency>
      <groupId>org.wiremock</groupId>
      <artifactId>wiremock</artifactId>
      <version>3.13.2</version>
      <scope>test</scope>
    </dependency>'''
idx = pom.rfind('</dependencies>')
open('$project_dir/pom.xml', 'w').write(pom[:idx] + dep + '\n  ' + pom[idx:])
"

          run_maven() {
            local attempt=1
            local max_attempts=3
            while true; do
              if mvn -B -f "$project_dir/pom.xml" "$@"; then
                return 0
              fi
              if [[ "$attempt" -ge "$max_attempts" ]]; then
                return 1
              fi
              attempt=$((attempt + 1))
              sleep 5
            done
          }

          run_maven clean test-compile
          run_maven gatling:test

      - name: Kotlin Gradle Gatling project from template main
        if: matrix.template == 'kotlin-gradle'
        run: scripts/test-kotlin-gradle-template.sh

      - name: Scala sbt Gatling project from template main
        if: matrix.template == 'scala-sbt'
        run: scripts/test-scala-sbt-template.sh

      - name: Remove local artifact from M2 before cache save
        if: always() && matrix.template == 'java-maven'
        run: rm -rf ~/.m2/repository/org/galaxio

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/sbt-setup
      - name: Coverage
        run: sbt clean coverage test "IntegrationTest/test" coverageOff coverageReport coverageAggregate
      - name: Publish test results (unit + integration)
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@283dea176069279a9076e77b548668a8e4f0c31b # v2.9.0
        with:
          check_name: "Test results (unit + integration)"
          junit_files: "**/target/test-reports/*.xml"
      - name: Upload test report XML (coverage gate)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-coverage
          path: "**/target/test-reports/*.xml"
          if-no-files-found: warn
          retention-days: 7
      - name: Upload coverage reports to Codecov
        if: always()
        uses: codecov/codecov-action@v7

  redis-integration:
    name: Redis Integration
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/sbt-setup
      - name: Run Redis integration tests
        run: sbt "IntegrationTest / test"
      - name: Publish integration test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@283dea176069279a9076e77b548668a8e4f0c31b # v2.9.0
        with:
          check_name: "Integration test results"
          junit_files: "**/target/test-reports/*.xml"
      - name: Upload integration test report XML
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-integration
          path: "**/target/test-reports/*.xml"
          if-no-files-found: warn
          retention-days: 7
