name: Continuous Integration

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SBT_OPTS: -Dsbt.color=true -Dsbt.log.noformat=false -Dsbt.supershell=false
  JAVA_OPTS: -Xms2G -Xmx2G -Xss4M -XX:+UseG1GC
  JVM_OPTS: -Xms2G -Xmx2G -Xss4M -XX:+UseG1GC
  JMH_WARMUP_ITERATIONS: "3"
  JMH_MEASUREMENT_ITERATIONS: "5"
  JMH_FORKS: "1"
  FORCE_COLOR: "1"
  TERM: xterm-256color

jobs:
  format:
    name: Formatting
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java (Temurin 21) with sbt cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Cache Coursier
        uses: coursier/cache-action@v8

      - name: Cache Ivy/SBT
        uses: actions/cache@v5
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: sbt-${{ runner.os }}-${{ hashFiles('**/*.sbt') }}-${{ hashFiles('project/**') }}
          restore-keys: sbt-${{ runner.os }}-

      - name: Check Formatting
        run: sbt scalafmtCheckAll scalafmtSbtCheck

  test:
    name: Test (Java ${{ matrix.java-version }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        java-version: ['17', '21']
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java (Temurin ${{ matrix.java-version }}) with sbt cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Cache Coursier
        uses: coursier/cache-action@v8

      - name: Cache Ivy/SBT
        uses: actions/cache@v5
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: sbt-${{ runner.os }}-${{ hashFiles('**/*.sbt') }}-${{ hashFiles('project/**') }}
          restore-keys: sbt-${{ runner.os }}-

      - name: Test
        run: sbt test

  template-tests:
    name: Template / ${{ matrix.template }} (Java ${{ matrix.java-version }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        java-version: ['21']
        template: [java-maven, kotlin-gradle, scala-sbt]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java (Temurin ${{ matrix.java-version }}) with sbt cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Setup Gradle
        if: matrix.template == 'kotlin-gradle'
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.6'

      - name: Setup Go for galaxio CLI
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install galaxio CLI from main
        run: go install github.com/galax-io/galaxio-cli/cmd/galaxio@main

      - name: Cache Coursier
        uses: coursier/cache-action@v8

      - name: Cache Ivy/SBT
        uses: actions/cache@v5
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: sbt-${{ runner.os }}-${{ hashFiles('**/*.sbt') }}-${{ hashFiles('project/**') }}
          restore-keys: sbt-${{ runner.os }}-

      - name: Cache Maven repository
        if: matrix.template == 'java-maven'
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: m2-${{ runner.os }}-${{ hashFiles('examples/java-maven-example/pom.xml') }}
          restore-keys: m2-${{ runner.os }}-

      - name: Publish local Picatinny artifact
        run: sbt 'set ThisBuild / version := "0.0.0-ci-local"' publishLocal publishM2

      - name: Java Maven Gatling project from template main
        if: matrix.template == 'java-maven'
        shell: bash
        run: |
          set -euo pipefail

          work_dir="$(mktemp -d)"
          trap 'rm -rf "$work_dir"' EXIT

          templates_dir="$work_dir/templates-gatling"
          registry_dir="$work_dir/registry"
          project_dir="$work_dir/java-maven-example"

          git clone --depth 1 https://github.com/galax-io/templates-gatling.git "$templates_dir"

          mkdir -p "$registry_dir"
          cat > "$registry_dir/galaxio-registry.yaml" <<YAML
          apiVersion: galaxio.io/v1
          kind: TemplateRegistry
          packs:
            - name: gatling
              source: local:$templates_dir
              description: Gatling performance testing templates from main
          YAML

          galaxio template init gatling/java-maven \
            --registry "local:$registry_dir" \
            --destination "$project_dir" \
            --set Name=java-maven-example \
            --set NameWord=picatinny \
            --set Package=org.galaxio.performance \
            --set PackagePath=org/galaxio/performance \
            --set GatlingPicatinnyVersion=0.0.0-ci-local \
            --set BaseUrl=http://localhost \
            --set BaseAuthUrl=http://localhost/auth \
            --set WsBaseUrl=ws://localhost/ws \
            --set Intensity="60 rpm" \
            --set StagesNumber=2 \
            --set RampDuration="1 second" \
            --set StageDuration="1 second" \
            --set TestDuration="5 seconds" \
            --set StartupBannerEnabled=true \
            --set DiagnosticsEnabled=true

          rm -rf "$project_dir/src/test/java/org/galaxio/performance/picatinny"
          cp -R examples/java-maven-example/src/test/java/org/galaxio/performance/picatinny \
            "$project_dir/src/test/java/org/galaxio/performance/picatinny"
          rm -rf "$project_dir/src/test/resources"
          cp -R examples/java-maven-example/src/test/resources "$project_dir/src/test/resources"

          run_maven() {
            local attempt=1
            local max_attempts=3
            while true; do
              if mvn -B -f "$project_dir/pom.xml" "$@"; then
                return 0
              fi
              if [[ "$attempt" -ge "$max_attempts" ]]; then
                return 1
              fi
              attempt=$((attempt + 1))
              sleep 5
            done
          }

          run_maven clean test-compile
          run_maven gatling:test

      - name: Kotlin Gradle Gatling project from template main
        if: matrix.template == 'kotlin-gradle'
        run: scripts/test-kotlin-gradle-template.sh

      - name: Scala sbt Gatling project from template main
        if: matrix.template == 'scala-sbt'
        run: scripts/test-scala-sbt-template.sh

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java (Temurin 21) with sbt cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Cache Coursier
        uses: coursier/cache-action@v8

      - name: Cache Ivy/SBT
        uses: actions/cache@v5
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: sbt-${{ runner.os }}-${{ hashFiles('**/*.sbt') }}-${{ hashFiles('project/**') }}
          restore-keys: sbt-${{ runner.os }}-

      - name: Coverage
        run: sbt clean coverage test coverageOff coverageReport coverageAggregate

      - name: Upload coverage reports to Codecov
        if: always()
        uses: codecov/codecov-action@v6

  benchmarks-current:
    name: JMH Benchmarks / current
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java (Temurin 21) with sbt cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Cache Coursier
        uses: coursier/cache-action@v8

      - name: Cache Ivy/SBT
        uses: actions/cache@v5
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: sbt-${{ runner.os }}-${{ hashFiles('**/*.sbt') }}-${{ hashFiles('project/**') }}
          restore-keys: sbt-${{ runner.os }}-

      - name: Run JMH benchmarks
        run: |
          mkdir -p .ci-artifacts/jmh/current
          sbt "Test / compile" "Jmh / run -wi ${JMH_WARMUP_ITERATIONS} -i ${JMH_MEASUREMENT_ITERATIONS} -f ${JMH_FORKS} -rf json -rff .ci-artifacts/jmh/current/results.json .*"

      - name: Build benchmark report
        shell: bash
        run: |
          set -euo pipefail

          report_dir=".ci-artifacts/jmh/current"
          results_file="$report_dir/results.json"
          report_file="$report_dir/report.md"

          {
            echo "# JMH benchmark report"
            echo
            echo "| Benchmark | Mode | Score | Error | Unit |"
            echo "| --- | --- | ---: | ---: | --- |"
            jq -r '
              sort_by(.benchmark)[] |
              "| `\(.benchmark | split(".") | last)` | \(.mode) | \(.primaryMetric.score | tostring) | \(.primaryMetric.scoreError // 0 | tostring) | \(.primaryMetric.scoreUnit) |"
            ' "$results_file"
          } > "$report_file"

          cat "$report_file" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload current benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmh-benchmark-current
          path: |
            .ci-artifacts/jmh/current
          if-no-files-found: error

  benchmarks-base:
    name: JMH Benchmarks / base branch
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout base branch for comparison
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base-branch

      - name: Setup Java (Temurin 21) with sbt cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Cache Coursier
        uses: coursier/cache-action@v8

      - name: Cache Ivy/SBT
        uses: actions/cache@v5
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: sbt-${{ runner.os }}-${{ hashFiles('**/*.sbt') }}-${{ hashFiles('project/**') }}
          restore-keys: sbt-${{ runner.os }}-

      - name: Copy benchmark sources to base branch
        shell: bash
        run: |
          set -euo pipefail

          find src/main/scala -name '*Benchmark.scala' -print0 | while IFS= read -r -d '' benchmark; do
            target="base-branch/$benchmark"
            mkdir -p "$(dirname "$target")"
            cp "$benchmark" "$target"
          done

      - name: Run base branch JMH benchmarks
        working-directory: base-branch
        run: |
          mkdir -p ../.ci-artifacts/jmh/base
          sbt "Test / compile" "Jmh / run -wi ${JMH_WARMUP_ITERATIONS} -i ${JMH_MEASUREMENT_ITERATIONS} -f ${JMH_FORKS} -rf json -rff base-jmh-results.json .*"
          cp base-jmh-results.json ../.ci-artifacts/jmh/base/results.json

      - name: Upload base benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmh-benchmark-base
          path: |
            .ci-artifacts/jmh/base
          if-no-files-found: error

  benchmarks-report:
    name: JMH Benchmarks / report
    needs: [benchmarks-current, benchmarks-base]
    if: always() && needs.benchmarks-current.result == 'success' && (needs.benchmarks-base.result == 'success' || needs.benchmarks-base.result == 'skipped')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download current benchmark artifacts
        uses: actions/download-artifact@v5
        with:
          name: jmh-benchmark-current
          path: .ci-artifacts/jmh/current

      - name: Download base benchmark artifacts
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@v5
        with:
          name: jmh-benchmark-base
          path: .ci-artifacts/jmh/base

      - name: Publish current benchmark report
        run: cat .ci-artifacts/jmh/current/report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Build benchmark comparison report
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          current_results=".ci-artifacts/jmh/current/results.json"
          base_results=".ci-artifacts/jmh/base/results.json"
          compare_file=".ci-artifacts/jmh/current/compare.md"

          jq -n \
            --slurpfile base "$base_results" \
            --slurpfile current "$current_results" '
            def normalize:
              map({
                key: (.benchmark + "|" + .mode),
                value: {
                  benchmark: .benchmark,
                  shortName: (.benchmark | split(".") | last),
                  mode: .mode,
                  unit: .primaryMetric.scoreUnit,
                  score: .primaryMetric.score,
                  error: (.primaryMetric.scoreError // 0)
                }
              }) | from_entries;
            ($base[0] | normalize) as $b
            | ($current[0] | normalize) as $c
            | ($b + $c | to_entries | map(.key) | unique | sort) as $keys
            | $keys
            | map({ key: ., base: $b[.], current: $c[.] })
            | map(select(.base != null and .current != null))
            | map(
                . + {
                  delta: (.current.score - .base.score),
                  pct: (if .base.score == 0 then null else ((.current.score - .base.score) / .base.score * 100) end),
                  status: (
                    if (.current.mode | ascii_downcase) == "thrpt" then
                      if .current.score > .base.score then "improved"
                      elif .current.score < .base.score then "regressed"
                      else "unchanged" end
                    else
                      if .current.score < .base.score then "improved"
                      elif .current.score > .base.score then "regressed"
                      else "unchanged" end
                    end
                  )
                }
              )
          ' > .ci-artifacts/jmh/current/compare.json

          {
            echo "# Benchmark comparison vs base branch"
            echo
            echo "| Benchmark | Mode | Base | PR | Delta | Change | Status |"
            echo "| --- | --- | ---: | ---: | ---: | ---: | --- |"
            jq -r '
              .[] |
              "| `\(.current.shortName)` | \(.current.mode) | \(.base.score | tostring) \(.base.unit) | \(.current.score | tostring) \(.current.unit) | \(.delta | tostring) | " +
              (if .pct == null then "n/a" else ((if .pct > 0 then "+" else "" end) + ((.pct * 100 | round) / 100 | tostring) + "%") end) +
              " | \(.status) |"
            ' .ci-artifacts/jmh/current/compare.json
          } > "$compare_file"

          cat "$compare_file" >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR benchmark comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const reportPath = fs.existsSync('.ci-artifacts/jmh/current/compare.md')
              ? '.ci-artifacts/jmh/current/compare.md'
              : '.ci-artifacts/jmh/current/report.md';
            const body = fs.readFileSync(reportPath, 'utf8');
            const marker = '<!-- jmh-benchmark-report -->';
            const commentBody = `${marker}\n${body}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(comment =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: commentBody,
              });
            }

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmh-benchmark-report
          path: |
            .ci-artifacts/jmh
          if-no-files-found: error

  release:
    name: Release (tag-driven)
    needs: [format, test, template-tests, coverage, benchmarks-current, benchmarks-report]
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java (Temurin 21) with sbt cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Cache Coursier
        uses: coursier/cache-action@v8

      - name: Cache Ivy/SBT
        uses: actions/cache@v5
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: sbt-${{ runner.os }}-${{ hashFiles('**/*.sbt') }}-${{ hashFiles('project/**') }}
          restore-keys: sbt-${{ runner.os }}-

      - name: Publish to Sonatype via sbt-ci-release
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF##*/}"
          VERSION="${TAG#v}"
          echo "Publishing version $VERSION (tag $TAG)"

          if [ -n "${PGP_SECRET:-}" ]; then
            echo "$PGP_SECRET" | base64 --decode | gpg --batch --import
          fi

          if sbt 'show dynver' >/dev/null 2>&1; then
            sbt ci-release
          else
            sbt "set ThisBuild/version := \"${VERSION}\"" ci-release
          fi

      - name: Generate Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          mode: "COMMIT"
          configuration: .github/changelog/release-changelog-builder.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
