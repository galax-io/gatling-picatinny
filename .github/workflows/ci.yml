name: Continuous Integration

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['main', 'release/**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SBT_OPTS: -Dsbt.color=true -Dsbt.log.noformat=false -Dsbt.supershell=false
  JAVA_OPTS: -Xms2G -Xmx2G -Xss4M -XX:+UseG1GC
  JVM_OPTS: -Xms2G -Xmx2G -Xss4M -XX:+UseG1GC
  FORCE_COLOR: "1"
  TERM: xterm-256color

jobs:
  format:
    name: Check Formatting
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/sbt-setup
      - run: sbt scalafmtCheckAll scalafmtSbtCheck

  test:
    name: Test (Java ${{ matrix.java-version }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        java-version: ['17', '21']
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/sbt-setup
        with:
          java-version: ${{ matrix.java-version }}
      - name: Test
        run: sbt Test/test

  publish-local:
    name: Publish Local
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/sbt-setup
      - name: Publish local Picatinny artifact
        run: sbt 'set ThisBuild / version := "0.0.0-ci-local"' 'set ThisBuild / publishM2Configuration := publishM2Configuration.value.withOverwrite(true)' publishLocal publishM2
      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci-artifacts/ivy .ci-artifacts/m2

          # sbt + Coursier may publish to ~/.cache/coursier/v1/local instead of ~/.ivy2/local
          IVY_SRC=""
          for candidate in "$HOME/.ivy2/local/org.galaxio" "$HOME/.cache/coursier/v1/local/org.galaxio"; do
            if find "$candidate" -name '*.jar' 2>/dev/null | grep -q .; then
              IVY_SRC="$candidate"
              break
            fi
          done
          if [ -z "$IVY_SRC" ]; then
            echo "::error::publishLocal artifact not found. Searched:"
            echo "  $HOME/.ivy2/local/org.galaxio"
            echo "  $HOME/.cache/coursier/v1/local/org.galaxio"
            find "$HOME/.ivy2/local" "$HOME/.cache/coursier/v1/local" -maxdepth 3 2>/dev/null || true
            exit 1
          fi
          cp -r "$IVY_SRC" .ci-artifacts/ivy/

          cp -r "$HOME/.m2/repository/org/galaxio" .ci-artifacts/m2/
      - uses: actions/upload-artifact@v7
        with:
          name: picatinny-local
          path: .ci-artifacts/
          retention-days: 1

  template-tests:
    name: Template / ${{ matrix.template }} (Java ${{ matrix.java-version }})
    needs: [publish-local]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        java-version: ['21']
        template: [java-maven, kotlin-gradle, scala-sbt]
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/sbt-setup
        with:
          java-version: ${{ matrix.java-version }}

      - name: Setup Gradle
        if: matrix.template == 'kotlin-gradle'
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.6'

      - name: Setup Go for galaxio CLI
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Install galaxio CLI from main
        run: go install github.com/galax-io/galaxio-cli/cmd/galaxio@main

      - name: Cache Maven repository
        if: matrix.template == 'java-maven'
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: m2-${{ runner.os }}-${{ hashFiles('examples/java-maven-example/pom.xml') }}
          restore-keys: m2-${{ runner.os }}-

      - uses: actions/download-artifact@v8
        with:
          name: picatinny-local
          path: .ci-artifacts/

      - name: Restore local artifacts
        shell: bash
        run: |
          set -euo pipefail
          # Restore to both ivy local locations for sbt + Coursier compatibility
          mkdir -p "$HOME/.ivy2/local" "$HOME/.cache/coursier/v1/local" "$HOME/.m2/repository/org"
          cp -r .ci-artifacts/ivy/org.galaxio "$HOME/.ivy2/local/"
          cp -r .ci-artifacts/ivy/org.galaxio "$HOME/.cache/coursier/v1/local/"
          cp -r .ci-artifacts/m2/org.galaxio "$HOME/.m2/repository/org/"

      - name: Java Maven Gatling project from template main
        if: matrix.template == 'java-maven'
        shell: bash
        run: |
          set -euo pipefail

          work_dir="$(mktemp -d)"
          trap 'rm -rf "$work_dir"' EXIT

          templates_dir="$work_dir/templates-gatling"
          registry_dir="$work_dir/registry"
          project_dir="$work_dir/java-maven-example"

          git clone --depth 1 https://github.com/galax-io/templates-gatling.git "$templates_dir"

          mkdir -p "$registry_dir"
          cat > "$registry_dir/galaxio-registry.yaml" <<YAML
          apiVersion: galaxio.io/v1
          kind: TemplateRegistry
          packs:
            - name: gatling
              source: local:$templates_dir
              description: Gatling performance testing templates from main
          YAML

          galaxio template init gatling/java-maven \
            --registry "local:$registry_dir" \
            --destination "$project_dir" \
            --set Name=java-maven-example \
            --set NameWord=picatinny \
            --set Package=org.galaxio.performance \
            --set PackagePath=org/galaxio/performance \
            --set GatlingPicatinnyVersion=0.0.0-ci-local \
            --set BaseUrl=http://localhost \
            --set BaseAuthUrl=http://localhost/auth \
            --set WsBaseUrl=ws://localhost/ws \
            --set Intensity="60 rpm" \
            --set StagesNumber=2 \
            --set RampDuration="1 second" \
            --set StageDuration="1 second" \
            --set TestDuration="5 seconds" \
            --set StartupBannerEnabled=true \
            --set DiagnosticsEnabled=true

          rm -rf "$project_dir/src/test/java/org/galaxio/performance/picatinny"
          cp -R examples/java-maven-example/src/test/java/org/galaxio/performance/picatinny \
            "$project_dir/src/test/java/org/galaxio/performance/picatinny"
          rm -rf "$project_dir/src/test/resources"
          cp -R examples/java-maven-example/src/test/resources "$project_dir/src/test/resources"

          run_maven() {
            local attempt=1
            local max_attempts=3
            while true; do
              if mvn -B -f "$project_dir/pom.xml" "$@"; then
                return 0
              fi
              if [[ "$attempt" -ge "$max_attempts" ]]; then
                return 1
              fi
              attempt=$((attempt + 1))
              sleep 5
            done
          }

          run_maven clean test-compile
          run_maven gatling:test

      - name: Kotlin Gradle Gatling project from template main
        if: matrix.template == 'kotlin-gradle'
        run: scripts/test-kotlin-gradle-template.sh

      - name: Scala sbt Gatling project from template main
        if: matrix.template == 'scala-sbt'
        run: scripts/test-scala-sbt-template.sh

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/sbt-setup
      - name: Coverage
        run: sbt clean coverage test "IntegrationTest/test" coverageOff coverageReport coverageAggregate
      - name: Upload coverage reports to Codecov
        if: always()
        uses: codecov/codecov-action@v7

  redis-integration:
    name: Redis Integration
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/sbt-setup
      - name: Run Redis integration tests
        run: sbt "IntegrationTest / test"
