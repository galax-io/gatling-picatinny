name: sbt setup
description: Setup Java (Temurin), sbt, and dependency caches

inputs:
  java-version:
    description: Temurin JDK version
    required: false
    default: '21'

runs:
  using: composite
  steps:
    - name: Setup Java (Temurin ${{ inputs.java-version }}) with sbt cache
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}
        cache: sbt

    - name: Setup sbt
      uses: sbt/setup-sbt@v1

    - name: Cache Coursier
      uses: coursier/cache-action@v8

    - name: Cache Ivy/SBT
      uses: actions/cache@v5
      with:
        path: |
          ~/.ivy2/cache
          ~/.sbt
          ~/.cache/coursier
        key: sbt-${{ runner.os }}-${{ hashFiles('**/*.sbt') }}-${{ hashFiles('project/**') }}
        restore-keys: sbt-${{ runner.os }}-
